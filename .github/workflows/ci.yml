# Roda em todo Pull Request aberto para a main
# Objetivo: garantir que nenhum PR quebra os testes ou a qualidade do código

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes unitários
        run: cd python_batch && pytest test_ingest_email_logs.py -v

      - name: Rodar dry-run do script de ingestão
        run: |
          cd python_batch && python ingest_email_logs.py \
                    --source-file ../data/raw_sfmc_email_logs.csv \
                    --project-id fake-project \
                    --dry-run
